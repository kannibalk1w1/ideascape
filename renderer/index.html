<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IdeaScape</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main id="app">
    <section id="canvas-shell" aria-label="Idea graph canvas">
      <canvas id="background-canvas" aria-hidden="true"></canvas>
      <div id="zoom-controls" class="toolbar cluster">
        <button id="zoom-in" title="Zoom in">+</button>
        <button id="zoom-out" title="Zoom out">-</button>
        <button id="fit-view" title="Fit view">Fit</button>
      </div>

      <div id="vault-controls" class="toolbar cluster">
        <button id="new-vault">New vault</button>
        <button id="open-vault">Open vault</button>
        <button id="save-vault">Save</button>
        <button id="export-png">PNG</button>
        <button id="export-gif">GIF</button>
        <button id="toggle-options">Options</button>
      </div>

      <aside id="options-panel" class="hidden">
        <header>
          <h2>Options</h2>
          <button id="close-options">Close</button>
        </header>

        <section>
          <h3>Palette</h3>
          <textarea id="palette-input" placeholder="Paste a Lospec URL, .hex/.gpl text, or hex colours"></textarea>
          <label class="check-row">
            <input id="apply-palette-existing" type="checkbox">
            Apply to existing nodes
          </label>
          <button id="import-palette">Import palette</button>
          <div id="palette-swatches"></div>
        </section>

        <section>
          <h3>Universe</h3>
          <label class="check-row"><input id="background-enabled" type="checkbox"> Background enabled</label>
          <label>Star density <input id="star-density" type="range" min="0" max="1" step="0.05"></label>
          <label>Nebula intensity <input id="nebula-intensity" type="range" min="0" max="1" step="0.05"></label>
          <label>Background opacity <input id="background-opacity" type="range" min="0" max="1" step="0.05"></label>
          <label class="check-row"><input id="comets-enabled" type="checkbox"> Random comets</label>
          <label>Comet frequency <input id="comet-frequency" type="range" min="0" max="1" step="0.05"></label>
          <label>Comet brightness <input id="comet-brightness" type="range" min="0" max="1" step="0.05"></label>
          <div class="button-row">
            <button id="choose-background">Import background</button>
            <button id="reset-background">Reset</button>
          </div>
        </section>

        <section>
          <h3>Idle Orbit</h3>
          <label class="check-row"><input id="orbit-enabled" type="checkbox"> Orbit after idle</label>
          <label>Idle seconds <input id="orbit-idle" type="number" min="3" max="120" step="1"></label>
        </section>
      </aside>

      <div id="search-panel">
        <input id="search-input" type="search" placeholder="Search nodes" autocomplete="off">
        <div id="search-results"></div>
      </div>
      <aside id="outline-panel" aria-label="Mind map outline"></aside>

      <svg id="graph" role="img" aria-label="IdeaScape graph">
        <defs>
          <marker id="arrow-forward" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z"></path>
          </marker>
        </defs>
        <g id="zoom-layer">
          <g id="edges"></g>
          <g id="selection-layer"></g>
          <g id="nodes"></g>
        </g>
      </svg>
    </section>

    <aside id="editor-panel" class="hidden">
      <header>
        <div>
          <span id="editor-kicker">Markdown note</span>
          <h1 id="editor-title">Untitled</h1>
        </div>
        <button id="close-editor" title="Close editor">Close</button>
      </header>
      <div id="editor-toolbar">
        <button data-md="heading">H</button>
        <button data-md="bold">B</button>
        <button data-md="italic">I</button>
        <button data-md="bullet">Bullets</button>
        <button data-md="numbered">Numbers</button>
        <button data-md="link">Link</button>
        <button data-md="image">Image</button>
        <input id="text-colour" type="color" value="#a3e635" title="Text colour">
      </div>
      <div id="editor-host"></div>
      <section id="preview-panel">
        <h2>Preview</h2>
        <article id="markdown-preview"></article>
      </section>
    </aside>

    <div id="context-menu"></div>
    <div id="toast" aria-live="polite"></div>
  </main>

  <script src="../node_modules/d3/dist/d3.min.js"></script>
  <script src="./state.js"></script>
  <script src="./palette.js"></script>
  <script src="./background.js"></script>
  <script src="./vault-client.js"></script>
  <script src="./graph.js"></script>
  <script src="./menu.js"></script>
  <script src="./editor.js"></script>
  <script src="./search.js"></script>
  <script src="./mindmap.js"></script>
  <script src="./options.js"></script>
  <script src="./exporter.js"></script>
  <script src="./interactions.js"></script>
  <script src="./app.js"></script>
</body>
</html>
